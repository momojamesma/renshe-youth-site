name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site health endpoint
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            https://renshe-youth-site.onrender.com/api/health
