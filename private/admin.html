<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>人社青年後台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section id="login-view" class="admin-card narrow">
        <p class="eyebrow">Admin Login</p>
        <h1>後台登入</h1>
        <p class="caption">此頁面不會在前台顯示。登入後可管理募款、專刊與管理員帳號。</p>
        <form id="login-form" class="stack-form">
          <label>
            帳號
            <input type="text" name="username" placeholder="請輸入帳號" required />
          </label>
          <label>
            密碼
            <input type="password" name="password" placeholder="請輸入密碼" required />
          </label>
          <button class="button primary" type="submit">登入</button>
        </form>
        <p id="login-message" class="message"></p>
      </section>

      <section id="dashboard-view" class="admin-card hidden">
        <div class="admin-header">
          <div>
            <p class="eyebrow">Dashboard</p>
            <h1>網站管理後台</h1>
          </div>
          <button id="logout-button" class="button secondary" type="button">登出</button>
        </div>

        <form id="dashboard-form" class="stack-form">
          <div class="section-heading compact">
            <h2>組織內容</h2>
            <p class="caption">可編輯網站主標、使命與關於我們段落。</p>
          </div>

          <div class="admin-grid">
            <label>
              組織名稱
              <input id="organization-name-input" type="text" required />
            </label>
            <label>
              首頁主標
              <input id="organization-tagline-input" type="text" required />
            </label>
            <label>
              IG 帳號
              <input value="@youth.hss" type="text" disabled />
            </label>
          </div>

          <label>
            使命說明
            <textarea id="organization-mission-input" rows="4" required></textarea>
          </label>

          <div class="section-heading compact">
            <h2>關於我們段落</h2>
            <p class="caption">建議保留三段，前台會依序顯示。</p>
          </div>

          <div class="about-editor">
            <label>
              段落 1
              <textarea id="about-paragraph-1" rows="4" required></textarea>
            </label>
            <label>
              段落 2
              <textarea id="about-paragraph-2" rows="4" required></textarea>
            </label>
            <label>
              段落 3
              <textarea id="about-paragraph-3" rows="4" required></textarea>
            </label>
          </div>

          <div class="section-heading compact">
            <h2>重點方向</h2>
            <p class="caption">首頁卡片區塊會顯示這三條重點。</p>
          </div>

          <div class="about-editor">
            <label>
              重點 1
              <input id="highlight-1" type="text" required />
            </label>
            <label>
              重點 2
              <input id="highlight-2" type="text" required />
            </label>
            <label>
              重點 3
              <input id="highlight-3" type="text" required />
            </label>
          </div>

          <div class="admin-grid">
            <label>
              募款標題
              <input id="donation-title-input" type="text" required />
            </label>
            <label>
              目前募款金額
              <input id="donation-raised-input" type="number" min="0" required />
            </label>
            <label>
              募款目標
              <input id="donation-target-input" type="number" min="0" required />
            </label>
          </div>

          <label>
            募款說明
            <textarea id="donation-summary-input" rows="4" required></textarea>
          </label>

          <div class="section-heading compact">
            <h2>刊物資料</h2>
            <p class="caption">可直接調整標題、期數、說明與狀態，也可新增或刪除。</p>
          </div>

          <div class="editor-toolbar">
            <button id="add-publication-button" class="button secondary" type="button">新增刊物</button>
          </div>
          <div id="publication-editor" class="publication-editor"></div>

          <div class="section-heading compact">
            <h2>管理員帳號</h2>
            <p class="caption">可新增後台管理員。帳號建立後可立即登入。</p>
          </div>

          <div id="admin-account-list" class="admin-account-list"></div>

          <div class="admin-grid">
            <label>
              新管理員帳號
              <input id="new-admin-username" type="text" />
            </label>
            <label>
              新管理員密碼
              <input id="new-admin-password" type="password" />
            </label>
            <div class="button-column">
              <span class="caption">建立後即可用於登入後台。</span>
              <button id="create-admin-button" class="button secondary" type="button">新增管理員</button>
            </div>
          </div>

          <p id="admin-message" class="message"></p>
          <button class="button primary" type="submit">儲存更新</button>
          <p id="save-message" class="message"></p>
        </form>
      </section>
    </main>

    <script src="/manage-console.js"></script>
  </body>
</html>
