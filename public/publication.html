<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>刊物內容 | 人社青年</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="front-page">
    <header class="site-header theme-block theme-header">
      <div class="brand-lockup">
        <span class="brand-mark">
          <img id="brand-avatar" class="brand-avatar hidden" alt="人社青年頭像" />
          <span id="brand-mark-text">RY</span>
        </span>
        <div>
          <p class="eyebrow">Publication</p>
          <h1 id="brand-name">人社青年</h1>
        </div>
      </div>
      <nav class="desktop-nav" aria-label="刊物導覽">
        <a href="/">回首頁</a>
        <a href="/#publications">返回刊物</a>
      </nav>
    </header>

    <main class="publication-page theme-block theme-publications">
      <article class="publication-detail">
        <p id="publication-tag" class="topic-pill"></p>
        <h1 id="publication-title"></h1>
        <p id="publication-description" class="publication-lead"></p>
        <div id="publication-content" class="publication-content"></div>
        <a class="button secondary" href="/#publications">回到刊物列表</a>
      </article>
    </main>

    <script src="/publication.js"></script>
  </body>
</html>
